<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop AI Crop Recommendation</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🌱 OptiCrop AI Crop Recommendation</h1>

        <form action="/predict" method="POST">

            <div class="input-box">
                <label>Nitrogen (N)</label>
                <input type="number" step="any" name="nitrogen" required>
            </div>

            <div class="input-box">
                <label>Phosphorous (P)</label>
                <input type="number" step="any" name="phosphorous" required>
            </div>

            <div class="input-box">
                <label>Potassium (K)</label>
                <input type="number" step="any" name="potassium" required>
            </div>

            <div class="input-box">
                <label>Temperature (°C)</label>
                <input type="number" step="any" name="temperature" required>
            </div>

            <div class="input-box">
                <label>Humidity (%)</label>
                <input type="number" step="any" name="humidity" required>
            </div>

            <div class="input-box">
                <label>pH</label>
                <input type="number" step="0.1" name="ph" required>
            </div>

            <div class="input-box">
                <label>Rainfall (mm)</label>
                <input type="number" step="any" name="rainfall" required>
            </div>

            <button type="submit">
                Predict Crop
            </button>

        </form>

        {% if prediction_text %}
        <div class="result">
            <h2>{{ prediction_text }}</h2>
        </div>
        {% endif %}

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
